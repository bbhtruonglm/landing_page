    <meta charset="UTF-8" />

    <title>Cảm ơn bạn đã đăng ký | Bot Bán Hàng</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --orange: #ff5722;
        --orange-light: #ff7a4d;
        --orange-pale: #fff1eb;
        --ink: #111111;
        --muted: #666666;
        --line: rgba(17, 17, 17, 0.08);
        --card: rgba(255, 255, 255, 0.88);
        --shadow: 0 24px 80px rgba(17, 17, 17, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Be Vietnam Pro", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(255, 87, 34, 0.16), transparent 32%),
          radial-gradient(circle at bottom right, rgba(255, 180, 150, 0.3), transparent 28%),
          linear-gradient(135deg, #fffdfb 0%, #fff5f0 46%, #fff 100%);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .thankyou-shell {
        width: min(100%, 960px);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        overflow: hidden;
      }

      .thankyou-band {
        height: 10px;
        background: linear-gradient(90deg, var(--orange), #ff9a76, #ffd6c8);
      }

      .thankyou-body {
        padding: 44px 36px 36px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--orange-pale);
        color: var(--orange);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--orange);
        box-shadow: 0 0 0 6px rgba(255, 87, 34, 0.12);
      }

      h1 {
        margin: 22px 0 14px;
        font-family: "Plus Jakarta Sans", sans-serif;
        font-size: clamp(34px, 4.2vw, 48px);
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        font-size: 17px;
        line-height: 1.8;
        color: var(--muted);
      }

      .actions {
        margin-top: 28px;
      }

      .btn-home {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 0 24px;
        border-radius: 14px;
        background: var(--orange);
        color: #fff;
        text-decoration: none;
        font-size: 16px;
        font-weight: 700;
        box-shadow: 0 18px 32px rgba(255, 87, 34, 0.22);
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      }

      .btn-home:hover {
        transform: translateY(-1px);
        background: var(--orange-light);
      }

      @media (min-width: 1100px) {
        h1 {
          white-space: nowrap;
        }
      }

      @media (max-width: 640px) {
        .thankyou-body {
          padding: 32px 20px 24px;
        }

        p {
          font-size: 15px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->

      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <main class="thankyou-shell">
      <div class="thankyou-band"></div>
      <div class="thankyou-body">
        <div class="eyebrow">Đăng ký thành công</div>
        <h1>Cảm ơn bạn đã để lại thông tin.</h1>
        <p>
          Bot Bán Hàng sẽ gửi bộ tài liệu AI và hướng dẫn dùng thử miễn phí tới
          bạn trong thời gian sớm nhất.
        </p>
        <div class="actions">
          <a class="btn-home" href="/">Quay lại trang chủ</a>
        </div>
      </div>
    </main>

  </body>
</html>
